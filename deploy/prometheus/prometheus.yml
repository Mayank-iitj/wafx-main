global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "wafx-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "opensearch"
    static_configs:
      - targets: ["opensearch:9200"]
    metrics_path: /_prometheus/metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
